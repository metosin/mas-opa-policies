when:
  event: push

steps:
  - name: test
    image: alpine:latest
    commands:
      - wget -q "https://github.com/open-policy-agent/opa/releases/download/v1.4.2/opa_linux_amd64_static" -O /usr/local/bin/opa
      - chmod +x /usr/local/bin/opa
      - opa test policies/ policies_test/ -v

  - name: deploy
    image: alpine:latest
    environment:
      OPA_API_TOKEN:
        from_secret: opa_api_token
    commands:
      - apk add --no-cache curl
      - chmod +x scripts/deploy-policies.sh
      - ./scripts/deploy-policies.sh
    when:
      branch: main
